{% extends "layout.html" %}
{% block title %}QRSE-X - 扫描结果{% endblock %}

{% block content %}
<div class="mb-6 flex items-center justify-between">
  <div>
    <h2 class="text-2xl font-bold">扫描结果</h2>
    <p class="text-gray-500 text-sm mt-1" id="report-subtitle">加载中...</p>
  </div>
  <div class="flex gap-2 print:hidden">
    <button class="btn btn-secondary btn-sm" onclick="window.print()">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
      打印
    </button>
    <a id="btn-download" href="#" class="btn btn-secondary btn-sm" download>下载 JSON</a>
    <a href="/" class="btn btn-secondary btn-sm">返回仪表盘</a>
  </div>
</div>

<!-- Mode chips -->
<div class="flex gap-2 mb-4 print:hidden">
  <span class="mode-chip mode-a">A 静态报告</span>
  <span class="mode-chip mode-b">B 实时推送</span>
  <span class="mode-chip mode-c">C 交互分析</span>
</div>

<!-- Summary cards -->
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6" id="summary-cards"></div>

<!-- Mode C: Filter toolbar -->
<div class="card mb-4 print:hidden">
  <div class="card-body py-2 flex items-center gap-3 flex-wrap">
    <span class="text-xs text-gray-500 font-semibold">过滤:</span>
    <button class="btn btn-sm status-filter active" data-status="all" onclick="setStatusFilter('all',this)">全部</button>
    <button class="btn btn-sm status-filter" data-status="vulnerable" onclick="setStatusFilter('vulnerable',this)">
      <span class="w-2 h-2 rounded-full bg-red-400 inline-block"></span> 漏洞
    </button>
    <button class="btn btn-sm status-filter" data-status="safe" onclick="setStatusFilter('safe',this)">
      <span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span> 安全
    </button>
    <button class="btn btn-sm status-filter" data-status="uncertain" onclick="setStatusFilter('uncertain',this)">
      <span class="w-2 h-2 rounded-full bg-yellow-400 inline-block"></span> 不确定
    </button>
    <div class="flex-1"></div>
    <span id="filter-counter" class="text-xs text-gray-400 font-mono"></span>
    <input id="finding-search" class="form-input text-xs py-1 w-48" placeholder="搜索 finding..." oninput="applyFilters()" />
    <select id="finding-sort" class="form-select text-xs py-1 w-32" onchange="applyFilters()">
      <option value="default">默认排序</option>
      <option value="confidence-desc">置信度 ↓</option>
      <option value="confidence-asc">置信度 ↑</option>
      <option value="file">按文件名</option>
    </select>
  </div>
</div>

<!-- Benchmark Score Panel (auto-shown when scores exist) -->
<div id="benchmark-panel" class="hidden mb-6">
  <div class="card">
    <div class="card-header">
      <span class="font-semibold text-sm">OWASP Benchmark 评分对比</span>
      <button class="btn btn-sm btn-secondary" onclick="loadBenchmarkScores()">刷新</button>
    </div>
    <div class="card-body">
      <div id="benchmark-compare-table"></div>
      <div class="mt-4" style="max-height:320px">
        <canvas id="chart-benchmark-cwe"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- Runs -->
<div id="runs-container" class="space-y-6"></div>
{% endblock %}

{% block scripts %}
<script>
const FILENAME = "{{ filename }}";

document.addEventListener('DOMContentLoaded', async () => {
  const res = await fetch(`/api/results/${FILENAME}`);
  if (!res.ok) {
    document.getElementById('report-subtitle').textContent = '报告未找到';
    return;
  }
  const data = await res.json();
  const meta = data.meta || {};
  const runs = data.runs || [];

  const cbType = meta.codebase_type ? ` | ${meta.codebase_type}` : '';
  document.getElementById('report-subtitle').textContent =
    `${meta.language || ''} | ${meta.total_runs || runs.length} 个扫描任务 | ${meta.generated_at ? new Date(meta.generated_at).toLocaleString('zh-CN') : ''}${cbType}`;
  document.getElementById('btn-download').href = `/api/results/${FILENAME}`;

  // Summary stats
  let totalFindings = 0, totalVuln = 0, totalSafe = 0, totalUncertain = 0;
  runs.forEach(r => {
    const s = r.stats || {};
    totalFindings += s.total_findings || 0;
    totalVuln += s.vulnerable || 0;
    totalSafe += s.safe || 0;
    totalUncertain += s.uncertain || 0;
  });

  document.getElementById('summary-cards').innerHTML = `
    <div class="stat-card"><div class="stat-value text-gray-300">${totalFindings}</div><div class="stat-label">CodeQL 发现</div></div>
    <div class="stat-card"><div class="stat-value text-red-400">${totalVuln}</div><div class="stat-label">确认漏洞</div></div>
    <div class="stat-card"><div class="stat-value text-green-400">${totalSafe}</div><div class="stat-label">安全</div></div>
    <div class="stat-card"><div class="stat-value text-yellow-400">${totalUncertain}</div><div class="stat-label">不确定</div></div>
  `;

  // Render each run
  const container = document.getElementById('runs-container');
  runs.forEach((run, ri) => {
    const statusBadge = run.status === 'success'
      ? '<span class="badge badge-green">成功</span>'
      : `<span class="badge badge-red">${run.error ? '失败' : run.status}</span>`;

    const findings = run.findings || [];
    let findingsHtml = '';
    if (findings.length === 0) {
      findingsHtml = '<div class="text-gray-600 text-sm py-4 text-center">无发现</div>';
    } else {
      findingsHtml = findings.map((f, fi) => renderFinding(f, ri, fi)).join('');
    }

    // Chart canvas
    const stats = run.stats || {};
    const hasChart = (stats.vulnerable || 0) + (stats.safe || 0) + (stats.uncertain || 0) > 0;

    container.innerHTML += `
      <div class="card">
        <div class="card-header">
          <div class="flex items-center gap-3">
            <span class="font-semibold text-sm">${run.vuln_type || 'Unknown'}</span>
            ${statusBadge}
          </div>
          <span class="text-xs text-gray-500">${run.run_id || ''}</span>
        </div>
        <div class="card-body">
          <!-- Run meta -->
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-xs mb-4">
            <div><span class="text-gray-500">源码:</span> <span class="text-gray-300">${run.source_dir ? run.source_dir.split(/[\\/]/).pop() : '-'}</span></div>
            <div><span class="text-gray-500">Commit:</span> <span class="text-gray-300 font-mono">${(run.commit_hash || '').slice(0, 8) || '-'}</span></div>
            <div><span class="text-gray-500">缓存:</span> <span class="text-gray-300">${run.db_from_cache ? '是' : '否'}</span></div>
            <div><span class="text-gray-500">阶段:</span> <span class="text-gray-300">${(run.completed_phases || []).length}/7</span></div>
            ${run.codebase_type ? `<div><span class="text-gray-500">代码库:</span> <span class="badge badge-purple">${escapeHtml(run.codebase_type)}</span></div>` : ''}
          </div>
          ${run.error ? `<div class="bg-red-900/20 border border-red-800 rounded p-3 text-red-400 text-sm mb-4">${escapeHtml(run.error)}</div>` : ''}
          <div class="flex gap-6">
            <div class="flex-1 findings-container">${findingsHtml}</div>
            ${hasChart ? `<div class="w-40 shrink-0"><canvas id="chart-${ri}"></canvas></div>` : ''}
          </div>
        </div>
      </div>
    `;

    // Draw chart
    if (hasChart) {
      setTimeout(() => {
        const ctx = document.getElementById(`chart-${ri}`);
        if (ctx) new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['漏洞', '安全', '不确定'],
            datasets: [{ data: [stats.vulnerable||0, stats.safe||0, stats.uncertain||0],
              backgroundColor: ['#f87171','#4ade80','#facc15'], borderWidth: 0 }]
          },
          options: { responsive: true, plugins: { legend: { display: true, position: 'bottom',
            labels: { color: '#9ca3af', font: { size: 10 } } } } }
        });
      }, 50);
    }
  });
});

function renderFinding(f, ri, fi) {
  const statusMap = {vulnerable:'badge-red', safe:'badge-green', uncertain:'badge-yellow'};
  const statusLabel = {vulnerable:'漏洞', safe:'安全', uncertain:'不确定'};
  const badge = `<span class="badge ${statusMap[f.status] || 'badge-gray'}">${statusLabel[f.status] || f.status}</span>`;
  const conf = Math.round((f.confidence || 0) * 100);
  const confColor = conf >= 80 ? '#f87171' : conf >= 50 ? '#facc15' : '#4ade80';

  let pocHtml = '';
  if (f.poc) {
    const p = f.poc;
    pocHtml = `<div class="mt-3 p-3 bg-gray-900 rounded">
      <div class="text-xs font-semibold text-brand-500 mb-2">Agent-S PoC</div>
      ${p.http_trigger ? `<div class="text-xs text-gray-400 mb-1"><span class="font-mono text-yellow-400">${p.http_trigger.method || 'GET'}</span> ${escapeHtml(p.http_trigger.path || '')}</div>` : ''}
      ${(p.payloads||[]).length > 0 ? `<div class="text-xs text-gray-500 mt-1">Payloads:</div>
        <ul class="list-disc list-inside text-xs text-gray-400 mt-1">${p.payloads.slice(0,3).map(pl => `<li class="font-mono break-all">${escapeHtml(pl)}</li>`).join('')}</ul>` : ''}
      ${p.severity ? `<div class="mt-1"><span class="badge ${p.severity==='critical'?'badge-red':p.severity==='high'?'badge-yellow':'badge-gray'}">${p.severity}</span></div>` : ''}
    </div>`;
  }

  const searchText = [f.file, f.rule_id, f.message, f.sink_method, f.engine_detected].filter(Boolean).join(' ').toLowerCase();
  return `
    <div class="finding-card" id="finding-${ri}-${fi}" data-status="${f.status||''}" data-confidence="${f.confidence||0}" data-file="${escapeHtml(f.file||'')}" data-searchtext="${escapeHtml(searchText)}">`
      <div class="finding-header" onclick="this.parentElement.classList.toggle('open')">
        <svg class="w-4 h-4 text-gray-600 shrink-0 transition-transform" style="transform:rotate(0deg)"><path fill="currentColor" d="M6 9l6 6 6-6z"/></svg>
        <span class="text-sm font-mono text-gray-300 flex-1 truncate">${escapeHtml(f.file || '')}:${f.line || '?'}</span>
        ${badge}
        <div class="w-16 shrink-0">
          <div class="confidence-bar"><div class="confidence-fill" style="width:${conf}%;background:${confColor}"></div></div>
          <div class="text-xs text-gray-600 text-center mt-0.5">${conf}%</div>
        </div>
      </div>
      <div class="finding-body">
        <div class="space-y-2 text-sm">
          <div><span class="text-gray-500">规则:</span> <span class="text-gray-300 font-mono text-xs">${escapeHtml(f.rule_id || '')}</span></div>
          <div><span class="text-gray-500">消息:</span> <span class="text-gray-400">${escapeHtml(f.message || '')}</span></div>
          <div><span class="text-gray-500">引擎:</span> <span class="text-brand-500">${escapeHtml(f.engine_detected || '-')}</span></div>
          <div><span class="text-gray-500">Sink:</span> <span class="font-mono text-yellow-400 text-xs">${escapeHtml(f.sink_method || '-')}</span></div>
          ${f.reasoning ? `<div class="p-2 bg-gray-900 rounded text-xs text-gray-400 leading-relaxed">${escapeHtml(f.reasoning)}</div>` : ''}
          ${f.code_context ? `<pre class="text-xs bg-black rounded p-2 overflow-x-auto"><code>${escapeHtml(f.code_context)}</code></pre>` : ''}
          ${pocHtml}
        </div>
      </div>
    </div>`;
}

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Mode C: Interactive filtering & sorting ---
let currentStatusFilter = 'all';
let allFindings = [];

function setStatusFilter(status, btn) {
  currentStatusFilter = status;
  document.querySelectorAll('.status-filter').forEach(b => b.classList.remove('active', 'btn-primary'));
  btn.classList.add('active', 'btn-primary');
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById('finding-search').value || '').toLowerCase();
  const sort = document.getElementById('finding-sort').value;

  document.querySelectorAll('.finding-card').forEach(card => {
    const status = card.dataset.status || '';
    const text = card.dataset.searchtext || '';
    const statusMatch = currentStatusFilter === 'all' || status === currentStatusFilter;
    const searchMatch = !search || text.includes(search);
    card.style.display = (statusMatch && searchMatch) ? '' : 'none';
  });

  if (sort !== 'default') {
    document.querySelectorAll('.findings-container').forEach(container => {
      const cards = Array.from(container.querySelectorAll('.finding-card'));
      cards.sort((a, b) => {
        if (sort === 'confidence-desc') return (parseFloat(b.dataset.confidence)||0) - (parseFloat(a.dataset.confidence)||0);
        if (sort === 'confidence-asc') return (parseFloat(a.dataset.confidence)||0) - (parseFloat(b.dataset.confidence)||0);
        if (sort === 'file') return (a.dataset.file||'').localeCompare(b.dataset.file||'');
        return 0;
      });
      cards.forEach(c => container.appendChild(c));
    });
  }

  // Update visible count
  const visible = document.querySelectorAll('.finding-card:not([style*="display: none"])').length;
  const total = document.querySelectorAll('.finding-card').length;
  const counter = document.getElementById('filter-counter');
  if (counter) counter.textContent = `${visible}/${total}`;
}

// --- Benchmark scoring ---
let benchmarkChart = null;

async function loadBenchmarkScores() {
  try {
    const res = await fetch('/api/benchmark/scores');
    if (!res.ok) return;
    const scores = await res.json();
    if (!scores || scores.length === 0) return;

    document.getElementById('benchmark-panel').classList.remove('hidden');
    renderBenchmarkTable(scores);
    renderBenchmarkChart(scores);
  } catch(e) {}
}

function renderBenchmarkTable(scores) {
  const container = document.getElementById('benchmark-compare-table');
  let html = `<div class="overflow-x-auto"><table class="data-table text-xs">
    <thead><tr>
      <th>配置</th><th>TP</th><th>FP</th><th>TN</th><th>FN</th>
      <th>Precision</th><th>Recall</th><th>F1</th><th>FPR</th><th>Youden</th>
    </tr></thead><tbody>`;

  scores.forEach(s => {
    const o = s.overall || {};
    const name = (s._filename || '').replace('benchmark_score_', '').replace('.json', '') || s.tool || 'unknown';
    const yClass = o.youden > 0.7 ? 'text-green-400' : o.youden > 0.4 ? 'text-yellow-400' : 'text-red-400';
    html += `<tr>
      <td class="font-medium text-brand-500">${escapeHtml(name)}</td>
      <td class="text-green-400">${o.tp||0}</td>
      <td class="text-red-400">${o.fp||0}</td>
      <td>${o.tn||0}</td>
      <td>${o.fn||0}</td>
      <td>${((o.precision||0)*100).toFixed(1)}%</td>
      <td>${((o.recall||0)*100).toFixed(1)}%</td>
      <td class="font-semibold">${(o.f1||0).toFixed(3)}</td>
      <td class="text-red-400">${((o.fpr||0)*100).toFixed(1)}%</td>
      <td class="${yClass} font-semibold">${o.youden >= 0 ? '+' : ''}${(o.youden||0).toFixed(3)}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function renderBenchmarkChart(scores) {
  if (scores.length === 0) return;
  const best = scores[scores.length - 1];
  const cats = best.categories || [];
  if (cats.length === 0) return;

  const labels = cats.map(c => c.label || c.category);
  const f1Data = cats.map(c => c.f1 || 0);
  const youdenData = cats.map(c => c.youden || 0);

  const ctx = document.getElementById('chart-benchmark-cwe');
  if (benchmarkChart) benchmarkChart.destroy();
  benchmarkChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'F1 Score', data: f1Data, backgroundColor: 'rgba(96,165,250,0.7)', borderRadius: 4 },
        { label: 'Youden Index', data: youdenData, backgroundColor: 'rgba(74,222,128,0.7)', borderRadius: 4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { ticks: { color: '#9ca3af', font: {size: 10} }, grid: { display: false } },
        y: { beginAtZero: true, max: 1.1, ticks: { color: '#6b7280' }, grid: { color: 'rgba(55,65,81,0.3)' } }
      },
      plugins: {
        legend: { labels: { color: '#9ca3af', usePointStyle: true } },
        tooltip: { backgroundColor: '#1f2937', titleColor: '#e5e7eb', bodyColor: '#d1d5db' }
      }
    }
  });
}

loadBenchmarkScores();
</script>
{% endblock %}
