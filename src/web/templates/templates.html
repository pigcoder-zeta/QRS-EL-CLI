{% extends "layout.html" %}
{% block title %}Argus - 模板库{% endblock %}

{% block content %}
<div class="mb-6 flex items-center justify-between">
  <div>
    <h2 class="text-2xl font-bold">黄金模板库</h2>
    <p class="text-gray-500 text-sm mt-1">预验证的 CodeQL 查询模板，按语言 × 漏洞类型组织</p>
  </div>
  <div class="flex items-center gap-3">
    <span class="text-sm text-gray-400">共 <strong id="total-count" class="text-brand-500">0</strong> 个模板</span>
    <span class="mode-chip mode-a">A 静态</span>
    <span class="mode-chip mode-b">B 实时</span>
    <span class="mode-chip mode-c">C 交互</span>
  </div>
</div>

<!-- Mode C: Search filter -->
<div class="flex gap-3 mb-4 print:hidden">
  <input id="tpl-search" class="form-input flex-1" placeholder="搜索模板（漏洞类型、描述、代码...）" oninput="searchTemplates()" />
  <button class="btn btn-secondary btn-sm" id="btn-compare" onclick="toggleCompareMode()">对比模式</button>
</div>

<!-- Language tabs -->
<div class="flex gap-2 mb-6 flex-wrap" id="lang-tabs"></div>

<!-- Template grid -->
<div id="tpl-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>

<!-- Template detail modal -->
<div id="tpl-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center" onclick="if(event.target===this)closeTplModal()">
  <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-[90vw] max-w-4xl max-h-[85vh] flex flex-col overflow-hidden">
    <div class="flex items-center justify-between p-4 border-b border-gray-700">
      <h3 id="modal-title" class="font-semibold text-lg"></h3>
      <button onclick="closeTplModal()" class="text-gray-500 hover:text-gray-300">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-4">
      <div class="grid grid-cols-3 gap-3 text-sm">
        <div><span class="text-gray-500">语言:</span> <span id="modal-lang" class="text-gray-300"></span></div>
        <div><span class="text-gray-500">漏洞类型:</span> <span id="modal-vuln" class="text-brand-500"></span></div>
        <div><span class="text-gray-500">CWE:</span> <span id="modal-cwe" class="text-gray-300 font-mono"></span></div>
      </div>
      <div id="modal-desc" class="text-sm text-gray-400"></div>
      <div>
        <div class="text-xs text-gray-500 mb-1 font-semibold">QL 代码</div>
        <pre class="code-block"><code id="modal-code" class="language-clike"></code></pre>
      </div>
    </div>
  </div>
</div>

<!-- Match tester -->
<div class="card mt-6">
  <div class="card-header">
    <span class="font-semibold text-sm">模板匹配测试器</span>
    <span class="text-xs text-gray-500">输入关键词模拟 Agent-Q 模板匹配</span>
  </div>
  <div class="card-body">
    <div class="flex gap-3 mb-4">
      <select id="test-lang" class="form-select w-32">
        <option value="java">Java</option>
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="go">Go</option>
        <option value="csharp">C#</option>
        <option value="cpp">C++</option>
      </select>
      <input id="test-keyword" class="form-input flex-1" placeholder="输入漏洞类型/关键词 如 EL Injection" />
      <button class="btn btn-primary" onclick="runMatchTest()">测试</button>
    </div>
    <div id="test-result" class="text-sm text-gray-400"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allTemplates = [];
let currentLang = 'all';

document.addEventListener('DOMContentLoaded', async () => {
  const res = await fetch('/api/templates');
  const data = await res.json();
  allTemplates = data.templates || [];
  document.getElementById('total-count').textContent = allTemplates.length;
  renderLangTabs();
  renderGrid('all');
});

function renderLangTabs() {
  const langs = {};
  allTemplates.forEach(t => {
    langs[t.language] = (langs[t.language] || 0) + 1;
  });
  const tabs = document.getElementById('lang-tabs');
  tabs.innerHTML = `<button class="tab-btn active" onclick="selectLang('all',this)">全部 <span class="text-xs text-gray-500">(${allTemplates.length})</span></button>`;
  Object.entries(langs).sort().forEach(([lang, count]) => {
    tabs.innerHTML += `<button class="tab-btn" onclick="selectLang('${lang}',this)">${langDisplay(lang)} <span class="text-xs text-gray-500">(${count})</span></button>`;
  });
}

function selectLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid(lang);
}

function renderGrid(lang) {
  const filtered = lang === 'all' ? allTemplates : allTemplates.filter(t => t.language === lang);
  const grid = document.getElementById('tpl-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="col-span-full text-center text-gray-600 py-12">暂无模板</div>';
    return;
  }
  grid.innerHTML = filtered.map(t => buildCardHtml(t)).join('');
}

let compareMode = false;
let compareList = [];

function searchTemplates() {
  const q = document.getElementById('tpl-search').value.toLowerCase();
  if (!q) { renderGrid(currentLang); return; }
  const filtered = allTemplates.filter(t =>
    (t.vuln_type||'').toLowerCase().includes(q) ||
    (t.description||'').toLowerCase().includes(q) ||
    (t.ql_code||'').toLowerCase().includes(q) ||
    (t.language||'').toLowerCase().includes(q)
  );
  renderFilteredGrid(filtered);
}

function renderFilteredGrid(list) {
  const grid = document.getElementById('tpl-grid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="col-span-full text-center text-gray-600 py-12">无匹配模板</div>';
    return;
  }
  grid.innerHTML = list.map((t, i) => buildCardHtml(t)).join('');
}

function buildCardHtml(t) {
  const preview = (t.ql_code || '').split('\n').slice(0, 6).join('\n');
  const compareCheck = compareMode
    ? `<input type="checkbox" class="compare-cb rounded border-gray-600 bg-gray-800" onchange="updateCompare(this, '${t.key}')" ${compareList.includes(t.key)?'checked':''} />`
    : '';
  return `
    <div class="card cursor-pointer hover:border-brand-500/50 transition-colors" data-key="${t.key}">
      <div class="card-body space-y-2">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            ${compareCheck}
            <span class="badge badge-${langColor(t.language)}">${langDisplay(t.language)}</span>
          </div>
          <div class="flex gap-1">
            <button class="btn btn-sm btn-secondary text-xs py-0" onclick="event.stopPropagation();copyCode('${t.key}')" title="复制代码">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            </button>
            <span class="text-xs text-gray-500 font-mono">${t.cwe || ''}</span>
          </div>
        </div>
        <div class="font-semibold text-sm text-gray-200" onclick="openTplModal(${JSON.stringify(t).replace(/'/g,'&#39;')})">${escapeHtml(t.vuln_type || t.name || '')}</div>
        <pre class="text-xs text-gray-600 bg-black/40 rounded p-2 overflow-hidden max-h-28 leading-relaxed" onclick="openTplModal(${JSON.stringify(t).replace(/'/g,'&#39;')})"><code>${escapeHtml(preview)}</code></pre>
      </div>
    </div>`;
}

function toggleCompareMode() {
  compareMode = !compareMode;
  compareList = [];
  document.getElementById('btn-compare').classList.toggle('btn-primary', compareMode);
  document.getElementById('btn-compare').textContent = compareMode ? '退出对比' : '对比模式';
  renderGrid(currentLang);
  if (!compareMode) document.getElementById('compare-panel')?.remove();
}

function updateCompare(cb, key) {
  if (cb.checked) { if (!compareList.includes(key)) compareList.push(key); }
  else { compareList = compareList.filter(k => k !== key); }
  if (compareList.length === 2) showComparePanel();
}

function showComparePanel() {
  document.getElementById('compare-panel')?.remove();
  const [a, b] = compareList.map(k => allTemplates.find(t => t.key === k));
  if (!a || !b) return;
  const panel = document.createElement('div');
  panel.id = 'compare-panel';
  panel.className = 'card mt-4';
  panel.innerHTML = `
    <div class="card-header"><span class="font-semibold text-sm">模板对比 <span class="mode-chip mode-c ml-1">交互</span></span>
      <button class="btn btn-sm btn-secondary" onclick="this.closest('.card').remove();compareList=[];renderGrid(currentLang)">关闭</button></div>
    <div class="card-body grid grid-cols-2 gap-4">
      <div><div class="text-sm font-semibold text-brand-500 mb-2">${a.vuln_type} (${langDisplay(a.language)})</div>
        <pre class="code-block text-xs"><code>${escapeHtml(a.ql_code)}</code></pre></div>
      <div><div class="text-sm font-semibold text-brand-500 mb-2">${b.vuln_type} (${langDisplay(b.language)})</div>
        <pre class="code-block text-xs"><code>${escapeHtml(b.ql_code)}</code></pre></div>
    </div>`;
  document.getElementById('tpl-grid').after(panel);
}

function copyCode(key) {
  const t = allTemplates.find(x => x.key === key);
  if (t) {
    navigator.clipboard.writeText(t.ql_code || '');
    showToast('QL 代码已复制');
  }
}

function showToast(msg) {
  let c = document.querySelector('.toast-container');
  if (!c) { c = document.createElement('div'); c.className = 'toast-container'; document.body.appendChild(c); }
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function openTplModal(t) {
  document.getElementById('modal-title').textContent = t.vuln_type || t.name || '';
  document.getElementById('modal-lang').textContent = langDisplay(t.language);
  document.getElementById('modal-vuln').textContent = t.vuln_type || '';
  document.getElementById('modal-cwe').textContent = t.cwe || '-';
  document.getElementById('modal-desc').textContent = t.description || '';
  document.getElementById('modal-code').textContent = t.ql_code || '';
  Prism.highlightElement(document.getElementById('modal-code'));
  document.getElementById('tpl-modal').classList.remove('hidden');
  document.getElementById('tpl-modal').classList.add('flex');
}

function closeTplModal() {
  document.getElementById('tpl-modal').classList.add('hidden');
  document.getElementById('tpl-modal').classList.remove('flex');
}

async function runMatchTest() {
  const lang = document.getElementById('test-lang').value;
  const kw = document.getElementById('test-keyword').value.trim();
  if (!kw) return;
  const res = await fetch('/api/templates/test', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({language: lang, keyword: kw}),
  });
  const data = await res.json();
  const el = document.getElementById('test-result');
  if (data.matched) {
    el.innerHTML = `<div class="p-3 bg-green-900/20 border border-green-800 rounded">
      <div class="text-green-400 font-semibold mb-1">命中模板</div>
      <div class="text-sm text-gray-300">漏洞类型: ${escapeHtml(data.template.vuln_type)}</div>
      <div class="text-sm text-gray-500">CWE: ${data.template.cwe || '-'}</div>
      <pre class="mt-2 text-xs bg-black rounded p-2 overflow-x-auto"><code>${escapeHtml((data.template.ql_code || '').slice(0, 500))}</code></pre>
    </div>`;
  } else {
    el.innerHTML = `<div class="p-3 bg-yellow-900/20 border border-yellow-800 rounded text-yellow-400">
      未命中任何模板。Agent-Q 将由 LLM 从零生成规则。</div>`;
  }
}

function langDisplay(lang) {
  return {java:'Java',python:'Python',javascript:'JavaScript',go:'Go',csharp:'C#',cpp:'C++'}[lang] || lang;
}
function langColor(lang) {
  return {java:'blue',python:'green',javascript:'yellow',go:'blue',csharp:'purple',cpp:'gray'}[lang] || 'gray';
}
function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
{% endblock %}
